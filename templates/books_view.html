<h1>КНИГИ</h1>

<ul>

    {% for i in book %}
    <li>
        <h2>Название: {{ i.title }}</h2>
        <p>Автор: {{ i.author }}</p>
        {% if i.cover %}
        <img src="i.cover" alt="">
        {% else %}
        <p>Изображение обложки не было добавлено</p>
        {% endif %}
        <br>
        <a href="{% url 'book_list_detailed' i.id %}">Подробная информация о книге</a>
    </li>
    {% endfor %}

</ul>
